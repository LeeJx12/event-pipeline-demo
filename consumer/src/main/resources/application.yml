spring:
  application:
    name: event-pipeline-consumer
  main:
    web-application-type: none
  lifecycle:
    timeout-per-shutdown-phase: 20s
  r2dbc:
    url: ${POSTGRES_R2DBC_URL:r2dbc:postgresql://localhost:5432/pipeline}
    username: ${POSTGRES_USER:pipeline}
    password: ${POSTGRES_PASSWORD:pipeline}
  flyway:
    enabled: true
    url: ${POSTGRES_JDBC_URL:jdbc:postgresql://localhost:5432/pipeline}
    user: ${POSTGRES_USER:pipeline}
    password: ${POSTGRES_PASSWORD:pipeline}
    locations: classpath:db/migration
    table: flyway_schema_history_consumer
    baseline-on-migrate: true
    baseline-version: 0

app:
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    group-id: event-pipeline-consumer
    topic: events

grpc:
  client:
    enrichment:
      address: ${ENRICHMENT_GRPC_ADDRESS:static://localhost:9090}
      negotiation-type: plaintext
      keep-alive-time: 30s
      max-inbound-message-size: 4194304 # 4MB

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  server:
    port: 9081

logging:
  level:
    root: INFO
    com.leejx.eventpipeline: DEBUG
    net.devh.boot.grpc: INFO
