spring:
  application:
    name: event-pipeline-consumer
  main:
    web-application-type: none
  lifecycle:
    timeout-per-shutdown-phase: 20s

app:
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    group-id: event-pipeline-consumer
    topic: events

grpc:
  client:
    enrichment:
      address: ${ENRICHMENT_GRPC_ADDRESS:static://localhost:9090}
      negotiation-type: plaintext
      keep-alive-time: 30s
      max-inbound-message-size: 4194304   # 4MB

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  server:
    port: 9081

logging:
  level:
    root: INFO
    com.leejx.eventpipeline: DEBUG
    net.devh.boot.grpc: INFO
