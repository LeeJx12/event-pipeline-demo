spring:
  application:
    name: event-pipeline-enrichment
  main:
    web-application-type: none # gRPC only, no HTTP
  lifecycle:
    timeout-per-shutdown-phase: 20s
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 1s
  r2dbc:
    url: ${POSTGRES_R2DBC_URL:r2dbc:postgresql://localhost:5432/pipeline}
    username: ${POSTGRES_USER:pipeline}
    password: ${POSTGRES_PASSWORD:pipeline}
  flyway:
    enabled: true
    url: ${POSTGRES_JDBC_URL:jdbc:postgresql://localhost:5432/pipeline}
    user: ${POSTGRES_USER:pipeline}
    password: ${POSTGRES_PASSWORD:pipeline}
    locations: classpath:db/migration
    table: flyway_schema_history_enrichment
    baseline-on-migrate: true
    baseline-version: 0

grpc:
  server:
    port: 9090
    enable-keep-alive: true
    keep-alive-time: 30s

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  server:
    port: 9091

logging:
  level:
    root: INFO
    com.leejx.eventpipeline: DEBUG
    net.devh.boot.grpc: INFO
